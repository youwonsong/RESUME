<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Generate Budget Justification</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>
    <body>
        <header class="bg-dark text-white py-3">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">Document Storage</h3>
                    <nav>
                        <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
                        <a href="/generate-page" class="btn btn-outline-light btn-sm me-2">Generate</a>
                        <a href="/extract-page" class="btn btn-outline-light btn-sm me-2">Extract</a>
                        <a href="/validate-page" class="btn btn-outline-light btn-sm">Validate</a>
                    </nav>
                </div>
            </div>
        </header>

        <section class="py-4">
            <div class="container text-center">
                <h4 class="mb-3">Generate Budget Justification</h4>

                <select id="templateSelect" class="form-select mb-3">
                    <option value="Template1.docx">Template 1</option>
                    <option value="Template2.docx">Template 2</option>
                </select>
                <input type="file" id="fileInput" class="form-control mb-3" accept=".xls,.xlsx,.xlsm">
                <button id="uploadBtn" class="btn btn-primary">Upload</button>
                <div id="status" class="mt-2 fw-bold"></div>
            </div>
        </section>

        <section class="py-5 bg-light">
            <div class="container">
                <h4 class="mb-4 text-center">Generated Documents</h4>
                <div id="docGrid" class="row g-4">
                    <!-- Cards are added here -->
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
