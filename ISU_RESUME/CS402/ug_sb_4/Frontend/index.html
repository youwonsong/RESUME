<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Document Storage</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>
    <body>
        <header class="bg-dark text-white py-3">
            <div class="container">
                <h3 class="mb-0">Document Storage</h3>
            </div>
        </header>

        <section class="py-4">
            <div class="container text-center">
                <select id="templateSelect" class="form-select mb-3">
                    <option value="Template1.docx">Template 1</option>
                    <option value="Template2.docx">Template 2</option>
                </select>
                <input type="file" id="fileInput" class="form-control mb-3" accept=".xls,.xlsx,.xlsm">
                <button id="uploadBtn" class="btn btn-primary">Upload</button>
                <div id="status" class="mt-2 fw-bold"></div>
            </div>
        </section>

        <section class="py-5 bg-light">
            <div class="container">
                <div id="docGrid" class="row g-4">
                    <!--Cards are added here-->
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
