<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Extract Section</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>
    <body>
        <header class="bg-dark text-white py-3">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">Document Storage</h3>
                    <nav>
                        <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
                        <a href="/generate-page" class="btn btn-outline-light btn-sm me-2">Generate</a>
                        <a href="/extract-page" class="btn btn-outline-light btn-sm me-2">Extract</a>
                        <a href="/validate-page" class="btn btn-outline-light btn-sm">Validate</a>
                    </nav>
                </div>
            </div>
        </header>

        <section class="py-4">
            <div class="container text-center">
                <h4 class="mb-3">Extract Section from Word Document</h4>

                <input type="file" id="docxInput" class="form-control mb-3" accept=".docx">
                <input type="text" id="sectionInput" class="form-control mb-3" placeholder="Enter section title">

                <button id="extractBtn" class="btn btn-primary">Extract Section</button>
                <div id="extractStatus" class="mt-2 fw-bold"></div>
            </div>
        </section>

        <section class="py-5 bg-light">
            <div class="container">
                <h4 class="mb-4 text-center">Generated Documents</h4>
                <div id="docGrid" class="row g-4">
                    <!-- Cards are added here -->
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
